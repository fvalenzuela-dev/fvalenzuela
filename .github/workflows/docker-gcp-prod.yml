name: Build and Deploy to GCP (PROD)

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    permissions:
      contents: read
      id-token: write
    uses: fvalenzuela-dev/.github/.github/workflows/build-and-push-docker-gcp.yml@main
    with:
      mage_name: "gh-front-fvalenzuela"
      dockerfile_path: "./Dockerfile"
      artifact_registry_region: "us-central1"
      artifact_registry_repository: "images-front"
      cloudrun_service: "fvalenzuela-deploy"
      cloudrun_region: "us-central1"
      build_args: |
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_PROD }}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL=${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_URL_PROD }}
        NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL=${{ secrets.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL_PROD }}
        NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
        NEXT_PUBLIC_PYTHON_API_URL=${{ secrets.NEXT_PUBLIC_PYTHON_API_URL_PROD }}
    secrets:
      gcp_project_id: ${{ secrets.GCP_PROJECT_ID_PROD }}
      gcp_workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD }}
      gcp_service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}